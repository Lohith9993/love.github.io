<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lohith 💘 Aishwarya</title>
    <!-- Poppins font for clean, romantic feel -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(145deg, #fff9f9 0%, #ffe6f0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
            width: 100%;
        }
        /* --- floating heart balloons container --- */
        .balloon-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .heart-balloon {
            position: absolute;
            font-size: 2.2rem;
            opacity: 0.7;
            user-select: none;
            animation: floatAround 20s infinite ease-in-out;
            filter: drop-shadow(0 8px 12px rgba(255, 80, 120, 0.25));
            will-change: transform;
            pointer-events: none;
        }
        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -25px) rotate(10deg); }
            50% { transform: translate(60px, 15px) rotate(-5deg); }
            75% { transform: translate(20px, 45px) rotate(8deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* --- main card — fully mobile responsive --- */
        .valentine-card {
            background: rgba(255, 245, 245, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px 40px 30px 40px;
            padding: 2rem 1.5rem;
            box-shadow: 0 20px 35px rgba(255, 105, 135, 0.2), 0 0 0 1px rgba(255, 220, 220, 0.7);
            text-align: center;
            max-width: 600px;
            width: 100%;
            border: 2px solid rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 20;
            transition: all 0.3s ease;
            margin: 0 auto;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #b13b4b;
            letter-spacing: 1px;
            text-shadow: 3px 3px 0 rgba(255, 200, 210, 0.4);
            margin-bottom: 0.3rem;
            line-height: 1.2;
        }
        .question {
            font-size: 1.9rem;
            font-weight: 600;
            margin-bottom: 2rem;
            margin-top: 0.5rem;
            color: #881a2a;
            background: rgba(255, 255, 240, 0.7);
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            display: inline-block;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 8px rgba(255, 170, 200, 0.3);
            width: 100%;
            word-break: break-word;
        }
        /* --- button area — flex wrap perfect for mobile --- */
        .button-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 0.8rem;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 30;
            width: 100%;
        }
        .btn {
            font-size: 1.8rem;
            font-weight: 600;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 100px;
            background: white;
            box-shadow: 0 7px 0 #c14a5e, 0 12px 25px rgba(200, 70, 100, 0.35);
            color: #d43b52;
            letter-spacing: 2px;
            transition: all 0.08s linear;
            border: 2px solid #ffc1cc;
            cursor: pointer;
            position: relative;
            z-index: 35;
            transform: scale(1);
            min-width: 160px;
            flex: 0 1 auto;
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
        }
        .btn-yes {
            background: #ffe3ec;
            color: #a12d3f;
            box-shadow: 0 7px 0 #b34b5a, 0 12px 25px #ff95a8;
        }
        .btn-no {
            background: #ffe8f0;
            color: #9e3d4a;
            box-shadow: 0 7px 0 #ad4e5c, 0 12px 25px #faa0b0;
        }
        .btn-yes:active {
            transform: scale(0.97);
            background: #ffdae5;
            box-shadow: 0 4px 0 #a14252, 0 12px 20px #ff809a;
        }
        /* moving away button — smooth runaway */
        .btn-no-move {
            transition: left 0.15s ease-out, top 0.15s ease-out, transform 0.1s;
        }
        /* hidden love message — with Aishwarya's name */
        .hidden-message {
            display: none;
            margin-top: 2.2rem;
            font-size: 1.7rem;
            background: rgba(255, 220, 240, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1.5rem 1.2rem;
            border-radius: 60px 20px 60px 20px;
            color: #c1233a;
            font-weight: 700;
            line-height: 1.5;
            border: 3px dashed #ff98aa;
            box-shadow: 0 0 35px #ffb6c1;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            z-index: 50;
            position: relative;
            width: 100%;
            word-break: break-word;
        }
        .hidden-message span {
            font-size: 2.8rem;
            display: inline-block;
            animation: pulseHeart 1.2s infinite;
        }
        @keyframes pulseHeart {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #ff1e3a; }
            100% { transform: scale(1); }
        }
        .show-message {
            display: flex !important;
        }
        
        /* sharkiee message — shows when NO is clicked */
        .sharkiee-message {
            margin-top: 1.5rem;
            font-size: 1.6rem;
            font-weight: 600;
            color: #b34b6a;
            background: rgba(255, 210, 220, 0.7);
            backdrop-filter: blur(8px);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            display: inline-block;
            border: 2px solid #ff8da1;
            box-shadow: 0 6px 0 #b35f6e;
            letter-spacing: 1px;
            animation: softGlow 1.8s infinite alternate;
            width: auto;
            max-width: 100%;
        }
        @keyframes softGlow {
            from { box-shadow: 0 6px 0 #b35f6e, 0 0 5px #ffb6c1; }
            to { box-shadow: 0 6px 0 #b35f6e, 0 0 20px #ff7b96; }
        }
        
        .romantic-names {
            font-size: 1.2rem;
            color: #b13b4b;
            margin-top: 0.8rem;
            font-weight: 600;
            opacity: 0.9;
        }
        
        .footnote {
            margin-top: 1.8rem;
            font-size: 1rem;
            color: #b15462;
            opacity: 0.9;
            font-style: italic;
            z-index: 25;
            position: relative;
            background: rgba(255,255,240,0.5);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            backdrop-filter: blur(2px);
            display: inline-block;
            max-width: 100%;
        }
        
        /* small screen fine-tuning */
        @media (max-width: 480px) {
            body { padding: 0.8rem; }
            .valentine-card { padding: 1.5rem 1rem; }
            h1 { font-size: 1.9rem; }
            .question { font-size: 1.6rem; padding: 0.5rem 0.8rem; }
            .btn { font-size: 1.5rem; padding: 0.7rem 1.2rem; min-width: 140px; }
            .hidden-message { font-size: 1.4rem; }
            .sharkiee-message { font-size: 1.4rem; }
        }
        @media (max-width: 360px) {
            .btn { font-size: 1.3rem; min-width: 120px; padding: 0.6rem 0.8rem; }
            .question { font-size: 1.4rem; }
        }
        
        @supports (padding: max(0px)) {
            body { padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right)); }
            .balloon-field { left: env(safe-area-inset-left); width: calc(100% - env(safe-area-inset-left) - env(safe-area-inset-right)); }
        }
    </style>
</head>
<body>

    <!-- FLOATING HEART BALLOONS (32 romantic hearts) -->
    <div class="balloon-field" id="heartBalloonField"></div>

    <!-- Main Valentine card with personalized names -->
    <div class="valentine-card">
        <h1>💗 Lohith 💘 Aishwarya 💗</h1>
        <div class="romantic-names">
            ✦ for my favorite person ✦
        </div>
        <div class="question">
            Aishwarya, will you be my Valentine?
        </div>

        <!-- YES & NO buttons — NO runs away and shows "I love you sharkiee" -->
        <div class="button-panel">
            <button class="btn btn-yes" id="yesBtn">YES 💘</button>
            <button class="btn btn-no btn-no-move" id="noBtn">NO 💔</button>
        </div>
        
        <!-- Special message when NO is clicked/touched — "I love you sharkiee" -->
        <div id="sharkieeMessage" style="min-height: 70px; margin-top: 0.8rem;"></div>

        <!-- Sweet message after YES — with Aishwarya's name and Lohith's promise -->
        <div id="loveMessage" class="hidden-message">
            <span>💖</span> I knew you'd say yes, Aishwarya! I will love you for the rest of my life <span>💖</span>
        </div>
        <div class="footnote">
            ✨ p.s. the 'no' button has a crush on you ✨
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ---------- FLOATING HEART BALLOONS (lots, personalized) ----------
            const balloonField = document.getElementById('heartBalloonField');
            const heartSymbols = ['❤️', '🧡', '💛', '💚', '💙', '💜', '🩷', '💖', '💗', '💓', '💞', '💕', '♥️', '💘', '💝', '🩵', '🩶', '💟'];
            // create 36 heart balloons — extra love for Aishwarya
            for (let i = 0; i < 36; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-balloon';
                heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 90 + '%';
                heart.style.top = Math.random() * 90 + '%';
                const size = 1.5 + Math.random() * 2.3;
                heart.style.fontSize = size + 'rem';
                const duration = 12 + Math.floor(Math.random() * 22);
                heart.style.animation = `floatAround ${duration}s infinite ease-in-out`;
                heart.style.animationDelay = Math.random() * 12 + 's';
                heart.style.opacity = 0.55 + Math.random() * 0.4;
                balloonField.appendChild(heart);
            }

            // ---------- PERSONALIZED BUTTONS: Aishwarya & Lohith ----------
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const loveMsg = document.getElementById('loveMessage');
            const sharkieeDiv = document.getElementById('sharkieeMessage');

            // ---------- FUNCTION: move NO button to random position ----------
            function moveNoButtonAway() {
                const winW = window.innerWidth;
                const winH = window.innerHeight;
                
                const btnRect = noBtn.getBoundingClientRect();
                const btnWidth = btnRect.width;
                const btnHeight = btnRect.height;

                const margin = 20;
                const maxLeft = winW - btnWidth - margin;
                const maxTop = winH - btnHeight - margin;

                let newLeft = margin + Math.random() * (maxLeft - margin);
                let newTop = margin + Math.random() * (maxTop - margin);

                newLeft = Math.max(margin, Math.min(newLeft, maxLeft));
                newTop = Math.max(margin, Math.min(newTop, maxTop));

                noBtn.style.position = 'fixed';
                noBtn.style.left = newLeft + 'px';
                noBtn.style.top = newTop + 'px';
                noBtn.style.zIndex = '100';
                noBtn.style.willChange = 'left, top';
            }

            // ---------- SHARKIEE MESSAGE: shows when NO is clicked/touched ----------
            function showSharkieeMessage() {
                sharkieeDiv.innerHTML = '<div class="sharkiee-message">🦈 I love you sharkiee, Aishwarya! 🦈</div>';
                // auto fade after 3 seconds? No, let it stay until YES is clicked — but it's cute!
                // If YES clicked later, we hide it.
            }

            // ---------- NO BUTTON EVENTS: run away + show sharkiee message ----------
            function runawayHandler(e) {
                if (e.cancelable) {
                    e.preventDefault();
                }
                moveNoButtonAway();
                // playful feedback
                noBtn.style.transform = 'scale(0.96)';
                noBtn.style.background = '#ffe0e5';
                noBtn.style.boxShadow = '0 5px 0 #ad4e5c, 0 12px 20px #faa0b0';
                setTimeout(() => {
                    noBtn.style.transform = 'scale(1)';
                    noBtn.style.background = '#ffe8f0';
                    noBtn.style.boxShadow = '0 7px 0 #ad4e5c, 0 12px 25px #faa0b0';
                }, 200);
            }

            // Touch and mouse events for NO button
            noBtn.addEventListener('touchstart', runawayHandler, { passive: false });
            noBtn.addEventListener('mouseenter', runawayHandler);

            // CLICK on NO → run away AND show "I love you sharkiee"
            noBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                moveNoButtonAway();
                // show sharkiee message with her name
                showSharkieeMessage();
                // change button text playfully
                noBtn.textContent = '🦈 sharkiee!';
                noBtn.style.background = '#ffe0e5';
                setTimeout(() => {
                    noBtn.style.background = '#ffe8f0'; 
                    noBtn.textContent = 'NO 💔';
                }, 700);
            });

            // ---------- YES BUTTON: reveal message with Aishwarya's name ----------
            yesBtn.addEventListener('click', function(e) {
                e.preventDefault();
                
                // Clear sharkiee message if visible
                sharkieeDiv.innerHTML = '';
                
                // hide both buttons gracefully
                yesBtn.style.opacity = '0';
                noBtn.style.opacity = '0';
                yesBtn.style.pointerEvents = 'none';
                noBtn.style.pointerEvents = 'none';
                
                // show the personalized love message with Aishwarya
                loveMsg.classList.add('show-message');

                // add extra heart burst — celebration!
                for (let i = 0; i < 16; i++) {
                    const extraHeart = document.createElement('div');
                    extraHeart.className = 'heart-balloon';
                    extraHeart.textContent = '💖';
                    extraHeart.style.left = (30 + Math.random() * 50) + '%';
                    extraHeart.style.top = (20 + Math.random() * 60) + '%';
                    extraHeart.style.fontSize = (1.8 + Math.random() * 2.8) + 'rem';
                    extraHeart.style.animation = `floatAround ${10 + Math.random() * 15}s infinite`;
                    extraHeart.style.opacity = 0.9;
                    balloonField.appendChild(extraHeart);
                }

                // make card extra romantic
                document.querySelector('.valentine-card').style.background = 'rgba(255, 210, 225, 0.9)';
                document.querySelector('.valentine-card').style.border = '4px solid #ff8da1';
                
                const foot = document.querySelector('.footnote');
                if (foot) foot.style.opacity = '0.4';
            });

            // ---------- Keep NO button visible on resize/orientation change (mobile) ----------
            function keepNoButtonVisible() {
                if (noBtn.style.position === 'fixed') {
                    const rect = noBtn.getBoundingClientRect();
                    const winW = window.innerWidth;
                    const winH = window.innerHeight;
                    let left = parseFloat(noBtn.style.left) || rect.left;
                    let top = parseFloat(noBtn.style.top) || rect.top;
                    const btnW = rect.width;
                    const btnH = rect.height;
                    let moved = false;
                    const margin = 15;

                    if (left + btnW > winW - margin) {
                        left = winW - btnW - margin;
                        moved = true;
                    }
                    if (left < margin) {
                        left = margin;
                        moved = true;
                    }
                    if (top + btnH > winH - margin) {
                        top = winH - btnH - margin;
                        moved = true;
                    }
                    if (top < margin) {
                        top = margin;
                        moved = true;
                    }
                    if (moved) {
                        noBtn.style.left = left + 'px';
                        noBtn.style.top = top + 'px';
                    }
                }
            }

            window.addEventListener('resize', keepNoButtonVisible);
            window.addEventListener('orientationchange', function() {
                setTimeout(keepNoButtonVisible, 50);
            });

            // Prevent touch scrolling on NO button
            noBtn.addEventListener('touchmove', function(e) {
                e.preventDefault();
            }, { passive: false });

            // Add a little initial sharkiee message? No, only when NO clicked.
            // But we can add a hidden romantic touch: on page load, small heart
            
            // Also, if someone clicks YES after seeing sharkiee, the sharkiee disappears (already handled)
        })();
    </script>
    
    <!-- Everything personalized: 
         - Her name: Aishwarya in question & final message
         - His name: Lohith in header
         - NO click shows "I love you sharkiee, Aishwarya!"
         - Floating heart balloons, runaway NO button, mobile perfect.
         Happy Valentine's! 💕
    -->
</body>
</html>
